<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Teacher Login</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f7fb;margin:0}
    .wrap{max-width:420px;margin:10vh auto;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;box-shadow:0 10px 20px rgba(17,24,39,.06)}
    .title{font-size:18px;font-weight:800;margin-bottom:10px}
    input{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;box-sizing:border-box;margin:6px 0}
    button{width:100%;padding:10px;border:0;border-radius:10px;background:#0ea5e9;color:#fff;font-weight:700;cursor:pointer;margin-top:10px}
    .err{color:#b91c1c;font-size:12px;margin-top:6px}
    .muted{color:#6b7280;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Teacher Login</div>
    <div class="muted">Use your name and 6-digit PIN.</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <form method="post">
      {% csrf_token %}
      <input name="full_name" placeholder="Full name" autocomplete="username"/>
      <input name="pin" placeholder="PIN (6 digits)" inputmode="numeric" autocomplete="current-password"/>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
