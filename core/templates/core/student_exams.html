<!doctype html>
<html lang="{{ ui_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ T.exam_practice }}</title>
  <style>
    :root{--ink:#172033;--muted:#64748b;--line:#dbe3ec;--blue:#0369a1;--paper:#fff;--bg:#eef4f7;--font:Georgia,"Times New Roman",serif;--font-kk:"Noto Sans","DejaVu Sans","Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:{% if ui_lang == 'kk' %}var(--font-kk){% else %}var(--font){% endif %};background:radial-gradient(circle at 12% 8%,#dbeafe 0,transparent 28%),linear-gradient(135deg,#f8fafc,#eaf2f4);min-height:100vh}
    button,input,textarea,select{font:inherit}.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:11px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .brand{font-weight:900;font-size:20px}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:9px 12px;text-decoration:none;cursor:pointer}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.danger{background:#b91c1c;color:#fff;border-color:#b91c1c}
    .timer{font-family:"Segoe UI",sans-serif;font-weight:900;font-variant-numeric:tabular-nums;background:#0f172a;color:#fff;border-radius:10px;padding:9px 13px}.timer.urgent{background:#b91c1c}
    .shell{max-width:1420px;margin:0 auto;padding:18px;display:grid;grid-template-columns:320px minmax(0,1fr);gap:15px}.panel{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 45px rgba(15,23,42,.08)}
    .sidebar{padding:14px;align-self:start;position:sticky;top:74px}.title{font-size:22px;font-weight:900}.muted{color:var(--muted);font-size:13px}.exam-list{display:flex;flex-direction:column;gap:9px;margin-top:12px}.exam-card{border:1px solid var(--line);border-radius:13px;padding:12px;background:#fff;cursor:pointer;text-align:left}.exam-card:hover{border-color:#7dd3fc;transform:translateY(-1px)}.exam-card strong{display:block;font-size:16px}.meta{font-size:12px;color:var(--muted);margin-top:5px}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;background:#e2e8f0;font:700 11px "Segoe UI",sans-serif}.pill.in_progress{background:#fef3c7;color:#92400e}.pill.submitted{background:#dcfce7;color:#166534}.pill.expired{background:#fee2e2;color:#991b1b}
    .workspace{padding:22px;min-height:70vh}.exam-head{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:16px}.instructions{white-space:pre-wrap;line-height:1.6;margin-top:9px}.question{border:1px solid var(--line);border-radius:15px;padding:18px;margin:13px 0;background:#fff}.question-head{display:flex;justify-content:space-between;gap:12px}.question-prompt{white-space:pre-wrap;font-size:17px;line-height:1.55;margin:11px 0}.question-image{display:block;max-width:100%;max-height:420px;object-fit:contain;margin:12px auto;border-radius:10px;border:1px solid var(--line)}
    .answer{width:100%;min-height:130px;border:1px solid #cbd5e1;border-radius:11px;padding:11px;resize:vertical}.answer:focus,.match-select:focus{outline:0;border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.14)}.save-state{font-size:12px;color:#0284c7;margin-top:6px;min-height:16px}
    .match-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:9px 18px;align-items:center}.match-left{padding:10px;border-radius:9px;background:#f1f5f9}.match-select{width:100%;border:1px solid #cbd5e1;border-radius:9px;padding:9px;background:#fff}
    .diagram-preview{border:1px dashed #94a3b8;border-radius:12px;padding:18px;text-align:center;background:#f8fafc}.submit-row{position:sticky;bottom:12px;display:flex;justify-content:flex-end;gap:10px;padding:12px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:13px;backdrop-filter:blur(8px)}
    .empty{text-align:center;padding:70px 20px;color:var(--muted)}.overlay{position:fixed;inset:0;background:rgba(2,6,23,.82);z-index:100;display:flex;flex-direction:column;padding:18px}.overlay[hidden]{display:none}.diagram-bar{display:flex;justify-content:space-between;gap:10px;background:#fff;padding:9px;border-radius:12px 12px 0 0}.diagram-frame{border:0;width:100%;height:calc(100vh - 90px);background:#fff;border-radius:0 0 12px 12px}
    .notice{position:fixed;right:18px;bottom:18px;z-index:120;max-width:420px;border-radius:11px;padding:10px 13px;background:#0f172a;color:#fff;display:none}.notice.show{display:block}.closed{padding:14px;border-radius:11px;background:#f1f5f9;color:#475569;margin:10px 0}
    @media(max-width:880px){.shell{grid-template-columns:1fr;padding:10px}.sidebar{position:static}.workspace{padding:14px}.match-grid{grid-template-columns:1fr}.topbar{padding:9px}.brand{font-size:17px}}
  </style>
</head>
<body>
<header class="topbar">
  <div class="brand">{{ T.exam_practice }}</div>
  <div class="actions">
    <span id="timer" class="timer" hidden>00:00:00</span>
    <a class="btn" href="/student/dashboard/">{{ T.dashboard }}</a>
    <a class="btn" href="/student/">{{ T.modules }}</a>
  </div>
</header>

<div class="shell">
  <aside class="panel sidebar">
    <div class="title">{{ T.available_exams }}</div>
    <div class="muted">{{ T.exam_start_note }}</div>
    <div id="examList" class="exam-list"></div>
  </aside>
  <main class="panel workspace">
    <div id="empty" class="empty">{{ T.select_exam_left }}</div>
    <div id="examView" hidden>
      <div class="exam-head">
        <div id="examTitle" class="title"></div>
        <div id="examTopic" class="muted"></div>
        <div id="examInstructions" class="instructions"></div>
      </div>
      <div id="closedState" class="closed" hidden></div>
      <div id="questions"></div>
      <div id="submitRow" class="submit-row">
        <span id="globalSave" class="muted"></span>
        <button id="submitBtn" class="btn danger" type="button">{{ T.submit_exam }}</button>
      </div>
    </div>
  </main>
</div>

<div id="diagramOverlay" class="overlay" hidden>
  <div class="diagram-bar">
    <b>{{ T.diagram_editor }}</b>
    <div class="actions"><button id="saveDiagramBtn" class="btn primary" type="button">{{ T.save_diagram }}</button><button id="closeDiagramBtn" class="btn" type="button">{{ T.close }}</button></div>
  </div>
  <iframe id="diagramFrame" class="diagram-frame" title="draw.io"></iframe>
</div>
<div id="notice" class="notice"></div>

<script>
const UI={
  noExams:"{{ T.no_available_exams|escapejs }}",start:"{{ T.start_exam|escapejs }}",continueText:"{{ T.continue_exam|escapejs }}",
  submitted:"{{ T.exam_submitted|escapejs }}",expired:"{{ T.exam_expired|escapejs }}",confirmStart:"{{ T.confirm_start_exam|escapejs }}",
  confirmSubmit:"{{ T.confirm_submit_exam|escapejs }}",saved:"{{ T.answer_saved|escapejs }}",saving:"{{ T.saving|escapejs }}",
  saveFailed:"{{ T.answer_save_failed|escapejs }}",selectMatch:"{{ T.select_match|escapejs }}",openDiagram:"{{ T.open_diagram|escapejs }}",
  diagramSaved:"{{ T.diagram_saved|escapejs }}",points:"{{ T.points|escapejs }}",loadFailed:"{{ T.failed_load_exams|escapejs }}"
};
let exams=[],activeExam=null,activeAttempt=null,questions=[],timerHandle=null,saveTimers=new Map(),diagramQuestion=null;
function cookie(name){return document.cookie.split(";").map(v=>v.trim()).find(v=>v.startsWith(name+"="))?.slice(name.length+1)||"";}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");}
async function api(url,method="GET",body=null){const opts={method,credentials:"include",headers:{"Accept":"application/json"}};if(method!=="GET"){opts.headers["Content-Type"]="application/json";opts.headers["X-CSRFToken"]=decodeURIComponent(cookie("csrftoken"));opts.body=JSON.stringify(body||{});}const r=await fetch(url,opts),ct=r.headers.get("content-type")||"";if(!ct.includes("application/json"))return{ok:false,error:`HTTP ${r.status}`};return r.json();}
function notify(text){const box=document.getElementById("notice");box.textContent=text;box.classList.add("show");setTimeout(()=>box.classList.remove("show"),2800);}
function attemptStatus(exam){return exam.attempt?.status||"not_started";}
async function loadExams(){const data=await api("/api/student/exams/");if(!data.ok){notify(data.error||UI.loadFailed);return;}exams=data.exams||[];renderExamList();}
function renderExamList(){const box=document.getElementById("examList");box.innerHTML="";if(!exams.length){box.innerHTML=`<div class="muted">${esc(UI.noExams)}</div>`;return;}exams.forEach(exam=>{const status=attemptStatus(exam);const button=document.createElement("button");button.type="button";button.className="exam-card";button.innerHTML=`<strong>${esc(exam.title)}</strong><div class="meta">${exam.question_count} | ${exam.total_points} ${esc(UI.points)} | ${exam.duration_minutes} min</div><div class="meta"><span class="pill ${esc(status)}">${esc(status)}</span></div>`;button.onclick=()=>chooseExam(exam);box.appendChild(button);});}
async function chooseExam(exam){if(!exam.attempt){if(!confirm(UI.confirmStart))return;const started=await api(`/api/student/exams/${exam.id}/start/`,"POST",{});if(!started.ok){notify(started.error);return;}}await openExam(exam.id);await loadExams();}
async function openExam(id){const data=await api(`/api/student/exams/${id}/`);if(!data.ok){notify(data.error);return;}activeExam=data.exam;activeAttempt=data.attempt;questions=data.questions||[];document.getElementById("empty").hidden=true;document.getElementById("examView").hidden=false;document.getElementById("examTitle").textContent=activeExam.title;document.getElementById("examTopic").textContent=activeExam.topic;document.getElementById("examInstructions").textContent=activeExam.instructions;renderQuestions();startTimer();}
function isClosed(){return !activeAttempt||activeAttempt.status!=="in_progress";}
function renderQuestions(){const box=document.getElementById("questions");box.innerHTML="";const closed=isClosed();document.getElementById("submitRow").hidden=closed;const closedBox=document.getElementById("closedState");closedBox.hidden=!closed;closedBox.textContent=activeAttempt.status==="expired"?UI.expired:UI.submitted;
  questions.forEach(q=>{const section=document.createElement("section");section.className="question";section.innerHTML=`<div class="question-head"><b>${q.position}.</b><span class="pill">${q.max_score} ${esc(UI.points)}</span></div><div class="question-prompt">${esc(q.prompt)}</div>${q.image_url?`<img class="question-image" src="${esc(q.image_url)}" alt="" loading="lazy">`:""}<div class="answer-slot"></div><div class="save-state" id="save-${q.id}"></div>`;const slot=section.querySelector(".answer-slot");
    if(q.question_type==="open_text"){const area=document.createElement("textarea");area.className="answer";area.value=q.answer.text_answer||"";area.disabled=closed;area.addEventListener("input",()=>scheduleSave(q,{text_answer:area.value}));slot.appendChild(area);}
    else if(q.question_type==="matching"){const grid=document.createElement("div");grid.className="match-grid";(q.left_items||[]).forEach(left=>{const label=document.createElement("div");label.className="match-left";label.textContent=left.text;const select=document.createElement("select");select.className="match-select";select.disabled=closed;select.innerHTML=`<option value="">${esc(UI.selectMatch)}</option>`+(q.right_items||[]).map(right=>`<option value="${esc(right.key)}">${esc(right.text)}</option>`).join("");select.value=(q.answer.matching_answer||{})[left.key]||"";select.onchange=()=>{const answer={...(q.answer.matching_answer||{})};if(select.value)answer[left.key]=select.value;else delete answer[left.key];q.answer.matching_answer=answer;scheduleSave(q,{matching_answer:answer},0);};grid.append(label,select);});slot.appendChild(grid);}
    else{const preview=document.createElement("div");preview.className="diagram-preview";preview.innerHTML=`<div>${q.answer.diagram_file_url?"Saved: "+esc(UI.diagramSaved):esc(UI.openDiagram)}</div>`;const button=document.createElement("button");button.className="btn primary";button.type="button";button.textContent=UI.openDiagram;button.disabled=closed;button.onclick=()=>openDiagram(q);preview.appendChild(button);slot.appendChild(preview);}
    box.appendChild(section);
  });
}
function scheduleSave(q,payload,delay=700){q.answer={...q.answer,...payload};document.getElementById(`save-${q.id}`).textContent=UI.saving;clearTimeout(saveTimers.get(q.id));saveTimers.set(q.id,setTimeout(()=>saveAnswer(q,payload),delay));}
async function saveAnswer(q,payload){const data=await api(`/api/student/exams/${activeExam.id}/questions/${q.id}/answer/`,"POST",payload);const state=document.getElementById(`save-${q.id}`);state.textContent=data.ok?UI.saved:(data.error||UI.saveFailed);if(data.ok){q.answer={...q.answer,...data.answer};if(data.warning)notify(data.warning);}}
function startTimer(){clearInterval(timerHandle);const timer=document.getElementById("timer");if(isClosed()){timer.hidden=true;return;}timer.hidden=false;const tick=()=>{const ms=new Date(activeAttempt.expires_at).getTime()-Date.now();if(ms<=0){timer.textContent="00:00:00";clearInterval(timerHandle);activeAttempt.status="expired";renderQuestions();notify(UI.expired);loadExams();return;}const total=Math.floor(ms/1000),h=Math.floor(total/3600),m=Math.floor(total%3600/60),s=total%60;timer.textContent=[h,m,s].map(v=>String(v).padStart(2,"0")).join(":");timer.classList.toggle("urgent",total<300);};tick();timerHandle=setInterval(tick,1000);}
document.getElementById("submitBtn").onclick=async()=>{if(!confirm(UI.confirmSubmit))return;const pending=[...saveTimers.values()];saveTimers.forEach(id=>clearTimeout(id));saveTimers.clear();const answers=questions.map(q=>({question_id:q.id,text_answer:q.answer.text_answer||"",matching_answer:q.answer.matching_answer||{},diagram_xml:q.answer.diagram_xml||"",upload_to_drive:false}));const data=await api(`/api/student/exams/${activeExam.id}/submit/`,"POST",{answers});if(!data.ok){notify(data.error);return;}activeAttempt=data.attempt;renderQuestions();startTimer();notify(UI.submitted);await loadExams();};

const overlay=document.getElementById("diagramOverlay"),frame=document.getElementById("diagramFrame"),drawOrigin="https://embed.diagrams.net";
function openDiagram(q){diagramQuestion=q;overlay.hidden=false;document.body.style.overflow="hidden";frame.src=drawOrigin+"/?embed=1&proto=json&spin=1&ui=min&libraries=1&saveAndExit=0&noExitBtn=1";}
function closeDiagram(){overlay.hidden=true;document.body.style.overflow="";frame.src="about:blank";diagramQuestion=null;}
function postDraw(message){frame.contentWindow?.postMessage(JSON.stringify(message),drawOrigin);}
window.addEventListener("message",event=>{if(event.origin!==drawOrigin||!diagramQuestion)return;let data;try{data=typeof event.data==="string"?JSON.parse(event.data):event.data;}catch{return;}if(data.event==="init")postDraw({action:"load",xml:diagramQuestion.answer.diagram_xml||"",autosave:1});if(data.event==="autosave"||data.event==="save"){diagramQuestion.answer.diagram_xml=data.xml||"";saveAnswer(diagramQuestion,{diagram_xml:diagramQuestion.answer.diagram_xml,upload_to_drive:data.event==="save"});if(data.event==="save"){notify(UI.diagramSaved);closeDiagram();}}});
document.getElementById("saveDiagramBtn").onclick=()=>postDraw({action:"save"});
document.getElementById("closeDiagramBtn").onclick=closeDiagram;
loadExams();
</script>
</body>
</html>
