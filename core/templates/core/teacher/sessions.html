{% extends "core/teacher/_base.html" %}

{% block title %}Sessions{% endblock %}

{% block teacher_content %}
<div class="page-header">
  <h1>Sessions</h1>
  <p>Create, edit and assign classes to sessions.</p>
</div>

<div style="display:grid; grid-template-columns: 380px 1fr; gap:24px; align-items:start;">
  <section style="border:1px solid #ddd; border-radius:12px; padding:16px;">
    <h2 id="form-title">Create session</h2>

    <form id="session-form">
      <input type="hidden" id="session-id" />

      <div style="margin-bottom:12px;">
        <label for="title"><strong>Title</strong></label><br>
        <input id="title" type="text" style="width:100%;" required>
      </div>

      <div style="margin-bottom:12px;">
        <label for="description"><strong>Description</strong></label><br>
        <textarea id="description" rows="4" style="width:100%;"></textarea>
      </div>

      <div style="margin-bottom:12px;">
        <label for="status"><strong>Status</strong></label><br>
        <select id="status" style="width:100%;">
          <option value="draft">draft</option>
          <option value="running">running</option>
          <option value="stopped">stopped</option>
        </select>
      </div>

      <div style="margin-bottom:12px;">
        <label for="starts_at"><strong>Starts at</strong></label><br>
        <input id="starts_at" type="datetime-local" style="width:100%;">
      </div>

      <div style="margin-bottom:12px;">
        <label for="ends_at"><strong>Ends at</strong></label><br>
        <input id="ends_at" type="datetime-local" style="width:100%;">
      </div>

      <div style="margin-bottom:16px;">
        <strong>Assign classes</strong>
        <div id="class-checkboxes" style="margin-top:8px; display:grid; gap:8px;"></div>
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button type="submit" id="save-btn">Save</button>
        <button type="button" id="reset-btn">Reset</button>
      </div>
    </form>

    <div id="form-message" style="margin-top:12px;"></div>
  </section>

  <section style="border:1px solid #ddd; border-radius:12px; padding:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h2 style="margin:0;">All sessions</h2>
      <button type="button" id="reload-btn">Reload</button>
    </div>

    <div id="sessions-list"></div>
  </section>
</div>

<script>
  const sessionsApiUrl = "/api/teacher/sessions/";
  let availableClasses = [];
  let sessionsCache = [];

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(";").shift();
    return "";
  }

  function toDatetimeLocalValue(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    const pad = n => String(n).padStart(2, "0");
    const yyyy = d.getFullYear();
    const mm = pad(d.getMonth() + 1);
    const dd = pad(d.getDate());
    const hh = pad(d.getHours());
    const mi = pad(d.getMinutes());
    return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
  }

  function escapeHtml(text) {
    return (text || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function parseJsonResponse(response) {
    const contentType = response.headers.get("content-type") || "";
    if (!contentType.includes("application/json")) {
      const text = await response.text();
      throw new Error(`Expected JSON, got ${response.status}. First 200 chars: ${text.slice(0, 200)}`);
    }

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || `HTTP ${response.status}`);
    }

    return data;
  }

  function renderClassCheckboxes(selectedIds = []) {
    const wrap = document.getElementById("class-checkboxes");

    if (!availableClasses.length) {
      wrap.innerHTML = "<em>No classes found.</em>";
      return;
    }

    wrap.innerHTML = availableClasses.map(cls => {
      const checked = selectedIds.includes(cls.id) ? "checked" : "";
      return `
        <label style="display:flex; gap:8px; align-items:center;">
          <input type="checkbox" class="class-checkbox" value="${cls.id}" ${checked}>
          <span>${escapeHtml(cls.name)}</span>
        </label>
      `;
    }).join("");
  }

  function getSelectedClassIds() {
    return [...document.querySelectorAll(".class-checkbox:checked")]
      .map(el => Number(el.value));
  }

  function resetForm() {
    document.getElementById("form-title").textContent = "Create session";
    document.getElementById("session-id").value = "";
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("status").value = "draft";
    document.getElementById("starts_at").value = "";
    document.getElementById("ends_at").value = "";
    document.getElementById("form-message").textContent = "";
    renderClassCheckboxes([]);
  }

  function fillForm(session) {
    document.getElementById("form-title").textContent = `Edit session #${session.id}`;
    document.getElementById("session-id").value = session.id;
    document.getElementById("title").value = session.title || "";
    document.getElementById("description").value = session.description || "";
    document.getElementById("status").value = session.status || "draft";
    document.getElementById("starts_at").value = toDatetimeLocalValue(session.starts_at);
    document.getElementById("ends_at").value = toDatetimeLocalValue(session.ends_at);
    document.getElementById("form-message").textContent = "";
    renderClassCheckboxes(session.class_group_ids || []);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderSessions() {
    const list = document.getElementById("sessions-list");

    if (!sessionsCache.length) {
      list.innerHTML = "<p><em>No sessions yet.</em></p>";
      return;
    }

    list.innerHTML = sessionsCache.map(session => {
      const classesText = (session.class_groups || []).length
        ? session.class_groups.map(c => escapeHtml(c.name)).join(", ")
        : "<em>Not assigned</em>";

      return `
        <div style="border:1px solid #ddd; border-radius:10px; padding:14px; margin-bottom:12px;">
          <div style="display:flex; justify-content:space-between; gap:12px; align-items:start;">
            <div>
              <h3 style="margin:0 0 6px 0;">${escapeHtml(session.title)}</h3>
              <div><strong>Status:</strong> ${escapeHtml(session.status)}</div>
              <div><strong>Starts:</strong> ${session.starts_at ? escapeHtml(session.starts_at) : "-"}</div>
              <div><strong>Ends:</strong> ${session.ends_at ? escapeHtml(session.ends_at) : "-"}</div>
              <div><strong>Classes:</strong> ${classesText}</div>
              <div><strong>Tasks:</strong> ${session.tasks_count}</div>
              <div><strong>Student sessions:</strong> ${session.student_sessions_count}</div>
              <div><strong>Active now:</strong> ${session.is_active_now ? "Yes" : "No"}</div>
              ${session.description ? `<p style="margin-top:8px;">${escapeHtml(session.description)}</p>` : ""}
            </div>

            <div style="display:flex; flex-direction:column; gap:8px;">
              <button type="button" onclick="editSession(${session.id})">Edit</button>
              <button type="button" onclick="deleteSession(${session.id})">Delete</button>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  async function loadSessions() {
    const response = await fetch(sessionsApiUrl, {
      method: "GET",
      headers: {
        "Accept": "application/json"
      }
    });

    const data = await parseJsonResponse(response);
    availableClasses = data.available_classes || [];
    sessionsCache = data.sessions || [];
    renderClassCheckboxes([]);
    renderSessions();
  }

  async function saveSession(event) {
    event.preventDefault();

    const sessionId = document.getElementById("session-id").value.trim();
    const messageEl = document.getElementById("form-message");

    const payload = {
      title: document.getElementById("title").value.trim(),
      description: document.getElementById("description").value.trim(),
      status: document.getElementById("status").value,
      starts_at: document.getElementById("starts_at").value || null,
      ends_at: document.getElementById("ends_at").value || null,
      class_group_ids: getSelectedClassIds(),
    };

    const isEdit = Boolean(sessionId);
    const url = isEdit ? `/api/teacher/sessions/${sessionId}/` : sessionsApiUrl;
    const method = isEdit ? "PATCH" : "POST";

    try {
      messageEl.textContent = "Saving...";

      const response = await fetch(url, {
        method,
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json",
          "X-CSRFToken": getCookie("csrftoken"),
        },
        body: JSON.stringify(payload),
      });

      const data = await parseJsonResponse(response);
      messageEl.textContent = isEdit ? "Session updated." : "Session created.";

      resetForm();
      await loadSessions();

    } catch (err) {
      messageEl.textContent = err.message;
    }
  }

  async function deleteSession(sessionId) {
    const ok = confirm("Delete this session?");
    if (!ok) return;

    try {
      const response = await fetch(`/api/teacher/sessions/${sessionId}/`, {
        method: "DELETE",
        headers: {
          "Accept": "application/json",
          "X-CSRFToken": getCookie("csrftoken"),
        },
      });

      await parseJsonResponse(response);
      await loadSessions();

    } catch (err) {
      alert(err.message);
    }
  }

  function editSession(sessionId) {
    const session = sessionsCache.find(s => s.id === sessionId);
    if (!session) return;
    fillForm(session);
  }

  document.getElementById("session-form").addEventListener("submit", saveSession);
  document.getElementById("reset-btn").addEventListener("click", resetForm);
  document.getElementById("reload-btn").addEventListener("click", loadSessions);

  loadSessions().catch(err => {
    document.getElementById("sessions-list").innerHTML =
      `<p style="color:red;">${escapeHtml(err.message)}</p>`;
  });

  window.editSession = editSession;
  window.deleteSession = deleteSession;
</script>
{% endblock %}
